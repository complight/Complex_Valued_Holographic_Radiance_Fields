name: compval
channels:
  - pytorch
  - nvidia/label/cuda-12.1.0
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - iopath
  - cuda-toolkit=12.1
  - cuda-nvcc
  - cuda-compiler
  - gcc_linux-64=12
  - gxx_linux-64=12
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - torch==2.4.0+cu121
    - torchvision==0.19.0+cu121
    - torchaudio==2.4.0+cu121
    - numpy==2.1.2
    - scipy==1.14.1
    - scikit-image==0.24.0
    - matplotlib==3.9.2
    - pillow==10.2.0
    - imageio==2.36.1
    - tqdm==4.67.1
    - opencv-contrib-python==4.10.0.84
    - lpips==0.1.4
    - odak==0.2.6
    - ninja==1.11.1.3
    - einops==0.8.0
    - plyfile==1.1
    - safetensors==0.5.3
    - piq==0.8.0
    - roma==1.5.2.1
    - loguru==0.7.3
    - ConfigArgParse==1.7
    - ffmpeg-python==0.2.0
    - pytorch-msssim==1.0.0
    - timm==1.0.15
    - gdown
